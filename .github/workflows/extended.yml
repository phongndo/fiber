name: Extended validation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extended-validation
  cancel-in-progress: true

jobs:
  platform-tests:
    name: Platform tests (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-14
            system: aarch64-darwin
          - os: macos-15-intel
            system: x86_64-darwin
    env:
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      CCACHE_MAXSIZE: 500M
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore trusted build cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-debug-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}
          restore-keys: |
            fiber-v1-${{ runner.os }}-${{ runner.arch }}-debug-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-

      - name: Install Homebrew LLVM
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install llvm

      - name: Build and test platform
        run: nix develop --command scripts/ci/platform

      - name: Save trusted build cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-debug-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}

  sanitizers:
    name: Address and undefined behavior sanitizers
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      CCACHE_MAXSIZE: 500M
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore trusted build cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-sanitizers-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}
          restore-keys: |
            fiber-v1-${{ runner.os }}-${{ runner.arch }}-sanitizers-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-

      - name: Run sanitizer suite
        run: nix develop --command scripts/ci/sanitizers

      - name: Save trusted build cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-sanitizers-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}

  benchmark-sample:
    name: Extended benchmark sample
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      CCACHE_MAXSIZE: 500M
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore trusted build cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}
          restore-keys: |
            fiber-v1-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-

      - name: Run extended benchmark sample
        run: nix develop --command scripts/ci/benchmarks extended

      - name: Save trusted build cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: build/release/benchmark-results.json
