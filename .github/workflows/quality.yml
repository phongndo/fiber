name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: 1.7.12

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cpp: ${{ steps.classify.outputs.cpp }}
      benchmarks: ${{ steps.classify.outputs.benchmarks }}
      workflows: ${{ steps.classify.outputs.workflows }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify impacted lanes
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: scripts/ci/changes.py

  workflow-lint:
    name: Workflow lint
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.11"
          cache: false

      - name: Install actionlint
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/actionlint"
          GOBIN="$RUNNER_TEMP/actionlint" \
            go install "github.com/rhysd/actionlint/cmd/actionlint@v${ACTIONLINT_VERSION}"
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Validate CI orchestration
        run: scripts/ci/workflows

  cpp:
    name: C++ correctness
    needs: changes
    if: needs.changes.outputs.cpp == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      CCACHE_MAXSIZE: 500M
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore trusted build cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-debug-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}
          restore-keys: |
            fiber-v1-${{ runner.os }}-${{ runner.arch }}-debug-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-

      - name: Run C++ suite
        run: nix develop --command scripts/ci/cpp

      - name: Save trusted build cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-debug-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}

  benchmarks:
    name: Benchmark smoke
    needs: changes
    if: needs.changes.outputs.benchmarks == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      CCACHE_MAXSIZE: 500M
      CONAN_HOME: ${{ github.workspace }}/.conan2

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore trusted build cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}
          restore-keys: |
            fiber-v1-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-

      - name: Build and exercise benchmarks
        run: nix develop --command scripts/ci/benchmarks smoke

      - name: Save trusted build cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ${{ env.CONAN_HOME }}
            ${{ env.CCACHE_DIR }}
            .zig-cache
            third_party/ghostty/.zig-cache
          key: fiber-v1-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/llvm', 'flake.lock', 'CMakeLists.txt', '.gitmodules') }}-${{ github.sha }}

  gate:
    name: CI gate
    needs:
      - changes
      - workflow-lint
      - cpp
      - benchmarks
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require every selected lane
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WORKFLOW_SELECTED: ${{ needs.changes.outputs.workflows }}
          WORKFLOW_RESULT: ${{ needs.workflow-lint.result }}
          CPP_SELECTED: ${{ needs.changes.outputs.cpp }}
          CPP_RESULT: ${{ needs.cpp.result }}
          BENCHMARKS_SELECTED: ${{ needs.changes.outputs.benchmarks }}
          BENCHMARKS_RESULT: ${{ needs.benchmarks.result }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$CHANGES_RESULT" != success ]]; then
            echo "::error::change classification ended with $CHANGES_RESULT"
            exit 1
          fi

          failed=0
          for entry in \
            "workflow-lint:$WORKFLOW_SELECTED:$WORKFLOW_RESULT" \
            "cpp:$CPP_SELECTED:$CPP_RESULT" \
            "benchmarks:$BENCHMARKS_SELECTED:$BENCHMARKS_RESULT"
          do
            name="${entry%%:*}"
            remainder="${entry#*:}"
            selected="${remainder%%:*}"
            result="${remainder#*:}"
            if [[ "$selected" == true && "$result" != success ]]; then
              echo "::error::$name was selected but ended with $result"
              failed=1
            elif [[ "$selected" != true && "$result" != skipped && "$result" != success ]]; then
              echo "::error::$name unexpectedly ended with $result"
              failed=1
            fi
          done
          exit "$failed"
